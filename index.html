<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Аня! 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            transition: background 1s ease;
        }

        body.envelope-closed {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #f48fb1 100%);
        }

        body.envelope-opened {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* Контейнер */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Фоновые сердечки */
        .bg-heart {
            position: fixed;
            pointer-events: none;
            animation: float ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Конфетти */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall linear forwards;
            z-index: 100;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Мерцающие звёздочки */
        .sparkle {
            position: fixed;
            pointer-events: none;
            animation: sparkle 2s ease-in-out infinite;
            z-index: 50;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Плавающие сердечки */
        .floating-heart {
            position: fixed;
            cursor: pointer;
            animation: floatUp linear forwards;
            z-index: 60;
            transition: transform 0.2s;
        }

        .floating-heart:hover {
            transform: scale(1.3) !important;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Заголовок */
        .title {
            font-size: 2rem;
            color: #be185d;
            text-align: center;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Конверт */
        .envelope-wrapper {
            position: relative;
            width: 280px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
        }

        .envelope-wrapper:hover {
            transform: scale(1.02);
        }

        .envelope-wrapper.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }

        /* Тень конверта */
        .envelope-shadow {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            transform: translateY(10px);
            filter: blur(10px);
        }

        /* Тело конверта */
        .envelope-body {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            overflow: hidden;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe4e6 100%);
            border: 3px solid #fda4af;
            box-shadow: 0 10px 40px rgba(244, 114, 182, 0.3);
        }

        .envelope-stripe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #f472b6, #ec4899, #f472b6);
        }

        /* Письмо внутри */
        .letter {
            position: absolute;
            inset: 8px;
            border-radius: 5px;
            background: linear-gradient(135deg, #fff 0%, #fef2f2 100%);
            border: 2px solid #fecdd3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: transform 0.5s ease-out;
        }

        /* Крышка конверта */
        .envelope-lid {
            position: absolute;
            inset: 0;
            transform-origin: top;
            transition: transform 0.5s ease-out;
            z-index: 10;
        }

        .envelope-lid::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #fecdd3;
            filter: drop-shadow(0 5px 10px rgba(244, 114, 182, 0.3));
        }

        .lid-heart {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Надпись на конверте */
        .envelope-label {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            font-size: 1.1rem;
            font-weight: bold;
            color: #db2777;
        }

        /* Прогресс */
        .progress-container {
            margin-top: 30px;
            text-align: center;
            width: 280px;
            position: relative;
            z-index: 10;
        }

        .progress-text {
            font-size: 1.2rem;
            color: #be185d;
            margin-bottom: 5px;
        }

        .progress-hint {
            font-size: 0.9rem;
            color: #ec4899;
            margin-bottom: 15px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 16px;
            background: #fbcfe8;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #ec4899, #db2777);
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-count {
            margin-top: 10px;
            font-size: 1rem;
            color: #db2777;
            font-weight: 600;
        }

        /* Открытое поздравление */
        .message-container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 0 20px;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .message-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .message-text {
            font-size: 1.8rem;
            color: white;
            min-height: 80px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .message-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .message-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .message-dot.active {
            background: #f472b6;
            transform: scale(1.25);
        }

        /* Финальное сообщение */
        .final-container {
            text-align: center;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-heart {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }

        .final-title {
            font-size: 3rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 4px 20px rgba(236, 72, 153, 0.5);
        }

        .final-text {
            font-size: 1.4rem;
            color: #fce7f3;
            margin-bottom: 15px;
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-counter {
            margin-top: 30px;
            animation: fadeIn 1s ease-out forwards;
        }

        .heart-counter p {
            color: #fbcfe8;
            margin-bottom: 5px;
        }

        .heart-counter .count {
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* Скрытие элементов */
        .hidden {
            display: none !important;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }
            
            .envelope-wrapper {
                width: 240px;
                height: 170px;
            }
            
            .envelope-lid::before {
                border-left-width: 120px;
                border-right-width: 120px;
                border-top-width: 85px;
            }
            
            .progress-container {
                width: 240px;
            }
            
            .message-text {
                font-size: 1.4rem;
            }
            
            .final-title {
                font-size: 2rem;
            }
            
            .final-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body class="envelope-closed">
    <!-- Элементы будут создаваться динамически -->
    
    <div id="envelope-screen" class="container">
        <h1 class="title">Для самой любимой... 💕</h1>
        
        <div class="envelope-wrapper" id="envelope" onclick="handleClick()">
            <div class="envelope-shadow"></div>
            <div class="envelope-body">
                <div class="envelope-stripe"></div>
                <div class="letter" id="letter">💌</div>
            </div>
            <div class="envelope-lid" id="lid">
                <span class="lid-heart">💗</span>
            </div>
            <div class="envelope-label">Для Ани 💝</div>
        </div>
        
        <div class="progress-container">
            <p class="progress-text" id="progress-text">Нажми на конверт... 💕</p>
            <p class="progress-hint" id="progress-hint">Начни открывать своё поздравление</p>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
            </div>
            <p class="progress-count"><span id="click-count">0</span> из 7 💕</p>
        </div>
    </div>
    
    <div id="message-screen" class="container hidden">
        <div class="message-container">
            <div class="message-card" id="message-card">
                <div class="message-emoji">💖</div>
                <p class="message-text" id="message-text"></p>
                <div class="message-dots" id="message-dots"></div>
            </div>
        </div>
    </div>
    
    <div id="final-screen" class="container hidden">
        <div class="final-container">
            <div class="final-heart">💕</div>
            <h1 class="final-title">С Днём Рождения, Аня!</h1>
            <p class="final-text" style="animation-delay: 0.2s">Ты — свет моей жизни ✨</p>
            <p class="final-text" style="animation-delay: 0.4s">Моя бесконечная любовь 💖</p>
            <p class="final-text" style="animation-delay: 0.6s">Самая прекрасная девушка на свете 🌹</p>
            <div class="heart-counter" id="heart-counter">
                <p>Поймано сердечек: <span class="count" id="caught-count">0</span> 💗</p>
                <p style="font-size: 0.9rem; color: #f9a8d4;">Лови сердечки, летящие вверх! 💕</p>
            </div>
        </div>
    </div>

    <script>
        // Настройки
        const TOTAL_CLICKS = 7;
        
        // Романтические сообщения
        const romanticMessages = [
            "С Днём Рождения, моя любимая Аня! 🎂",
            "Я тебя очень сильно люблю! ❤️",
            "Ты самая лучшая и красивая девочка на свете! 🌹",
            "Ты делаешь меня самым счастливым человеком! 💕",
            "Спасибо, что ты есть в моей жизни! 🌟",
            "Ты — моё счастье, моя радость, моя любовь! 💖",
            "Каждый день с тобой — это подарок! 🎁",
            "Ты наполняешь мою жизнь смыслом и светом! ✨",
            "Ты — моя единственная и неповторимая! 💝",
            "Ты — лучшее, что случилось в моей жизни! 🦋"
        ];
        
        // Этапы открытия конверта
        const openingStages = [
            { text: "Нажми на конверт... 💕", hint: "Начни открывать своё поздравление" },
            { text: "Ещё немного... 💫", hint: "Продолжай!" },
            { text: "Так интересно! 💌", hint: "Уже скоро!" },
            { text: "Почти открыто! 🌹", hint: "Ещё чуть-чуть!" },
            { text: "Волнительно! 💖", hint: "Почти готово!" },
            { text: "Последний раз! ✨", hint: "Открой меня!" },
            { text: "Открыто! 🎉", hint: "Наслаждайся!" }
        ];
        
        // Состояние
        let clickCount = 0;
        let isOpened = false;
        let currentMessageIndex = 0;
        let caughtHearts = 0;
        let floatingHeartsInterval = null;
        
        // Элементы DOM
        const body = document.body;
        const envelope = document.getElementById('envelope');
        const lid = document.getElementById('lid');
        const letter = document.getElementById('letter');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const progressHint = document.getElementById('progress-hint');
        const clickCountEl = document.getElementById('click-count');
        const envelopeScreen = document.getElementById('envelope-screen');
        const messageScreen = document.getElementById('message-screen');
        const finalScreen = document.getElementById('final-screen');
        const messageText = document.getElementById('message-text');
        const messageDots = document.getElementById('message-dots');
        const caughtCountEl = document.getElementById('caught-count');
        
        // Инициализация фоновых сердечек
        function initBackgroundHearts() {
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'bg-heart';
                heart.innerHTML = '💗';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.opacity = Math.random() * 0.3 + 0.1;
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                document.body.appendChild(heart);
            }
        }
        
        // Создание конфетти
        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd', '#ff9f43'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = (-10 - Math.random() * 50) + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                document.body.appendChild(confetti);
            }
        }
        
        // Создание звёздочек
        function createSparkles() {
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '✨';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.fontSize = (Math.random() * 8 + 4) + 'px';
                sparkle.style.animationDelay = (Math.random() * 3) + 's';
                document.body.appendChild(sparkle);
            }
        }
        
        // Создание плавающих сердечек
        function startFloatingHearts() {
            floatingHeartsInterval = setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.bottom = '-50px';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 4) + 's';
                heart.onclick = function() {
                    caughtHearts++;
                    caughtCountEl.textContent = caughtHearts;
                    this.remove();
                };
                document.body.appendChild(heart);
                
                // Удаление через время
                setTimeout(() => {
                    if (heart.parentNode) heart.remove();
                }, 6000);
            }, 500);
        }
        
        // Обработка клика по конверту
        function handleClick() {
            if (isOpened) return;
            
            clickCount++;
            const stage = openingStages[Math.min(clickCount, openingStages.length - 1)];
            
            // Анимация тряски
            envelope.classList.add('shake');
            setTimeout(() => envelope.classList.remove('shake'), 500);
            
            // Обновление прогресса
            const progress = (clickCount / TOTAL_CLICKS) * 100;
            progressBar.style.width = progress + '%';
            clickCountEl.textContent = clickCount;
            progressText.textContent = stage.text;
            progressHint.textContent = stage.hint;
            
            // Анимация крышки
            const currentRotation = (clickCount / TOTAL_CLICKS) * 180;
            lid.style.transform = `rotateX(${currentRotation}deg)`;
            
            // Анимация письма
            const letterOffset = (clickCount / TOTAL_CLICKS) * 150;
            letter.style.transform = `translateY(-${letterOffset}px)`;
            
            // Проверка открытия
            if (clickCount >= TOTAL_CLICKS) {
                setTimeout(openEnvelope, 500);
            }
        }
        
        // Открытие конверта
        function openEnvelope() {
            isOpened = true;
            body.classList.remove('envelope-closed');
            body.classList.add('envelope-opened');
            
            // Создание эффектов
            createConfetti();
            createSparkles();
            
            // Переключение экранов
            setTimeout(() => {
                envelopeScreen.classList.add('hidden');
                messageScreen.classList.remove('hidden');
                
                // Создание точек прогресса сообщений
                for (let i = 0; i < romanticMessages.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'message-dot';
                    dot.id = 'dot-' + i;
                    messageDots.appendChild(dot);
                }
                
                // Запуск печатания
                setTimeout(typeMessage, 500);
            }, 500);
        }
        
        // Эффект печатания
        function typeMessage() {
            const message = romanticMessages[currentMessageIndex];
            let charIndex = 0;
            messageText.innerHTML = '<span class="cursor">|</span>';
            
            // Обновление точек
            for (let i = 0; i < romanticMessages.length; i++) {
                const dot = document.getElementById('dot-' + i);
                dot.classList.toggle('active', i <= currentMessageIndex);
            }
            
            const typeInterval = setInterval(() => {
                if (charIndex < message.length) {
                    messageText.innerHTML = message.slice(0, charIndex + 1) + '<span class="cursor">|</span>';
                    charIndex++;
                } else {
                    clearInterval(typeInterval);
                    setTimeout(() => {
                        if (currentMessageIndex < romanticMessages.length - 1) {
                            currentMessageIndex++;
                            typeMessage();
                        } else {
                            showFinalMessage();
                        }
                    }, 2000);
                }
            }, 80);
        }
        
        // Финальное сообщение
        function showFinalMessage() {
            messageScreen.classList.add('hidden');
            finalScreen.classList.remove('hidden');
            startFloatingHearts();
        }
        
        // Инициализация
        initBackgroundHearts();
    </script>
</body>
</html>
